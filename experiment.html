<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="connect-src *;" />
    <title>实验 - 白蝉声</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        background-color: #ff0000;
        font-family: 'STKaiti', 'KaiTi', 'Microsoft YaHei', sans-serif;
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
      }

      /* 回到首页的小按钮 */
      .home-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background-color: white;
        color: black;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .home-button:hover {
        background-color: #f0f0f0;
        transform: scale(1.05);
      }

      .text-container {
        width: 100%;
        max-width: 100vw;
      }

      .text-line {
        font-size: 16vw;
        font-weight: 900;
        color: white;
        line-height: 1;
        letter-spacing: -0.02em;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
      }
    </style>
  </head>
  <body>
    <!-- 回到首页的小按钮 -->
    <a href="index.html" class="home-button">首页</a>

    <div class="text-container">
      <div class="text-line">該上的車說實話</div>
      <div class="text-line">在這裡也許應該</div>
      <div class="text-line">請假嘿在說什麼</div>
      <div class="text-line">啥話真是不能這</div>
      <div class="text-line">樣沒有必要將死</div>
      <div class="text-line">之人其言也善哦</div>
      <div class="text-line">其實不恰當但是</div>
      <div class="text-line">沒有必要這會讓</div>
      <div class="text-line">下意識感覺到痛</div>
      <div class="text-line">苦這可能是的口</div>
      <div class="text-line">頭禪內心裡面的</div>
      <div class="text-line">口頭禪嗎 嘿你</div>
      <div class="text-line">該死了 要進去</div>
      <div class="text-line">哦這是什麼什麼</div>
      <div class="text-line">時候用的手機不</div>
      <div class="text-line">過應該是太熟練</div>
      <div class="text-line">了已經急自己做</div>
      <div class="text-line">過這種事情看看</div>
      <div class="text-line">吧好像世界都丟</div>
      <div class="text-line">了也許應該看看</div>
      <div class="text-line">車牌號在這讓感</div>
      <div class="text-line">到不安不過想來</div>
      <div class="text-line">似乎並沒有因為</div>
      <div class="text-line">不看有什麼後果</div>
      <div class="text-line">過但這也只是現</div>
      <div class="text-line">在往回去回想的</div>
      <div class="text-line">假設因為記者的</div>
      <div class="text-line">情況下都會去看</div>
      <div class="text-line">真的是0129嗯知</div>
      <div class="text-line">道的可以這樣不</div>
    </div>
  </body>
</html>
