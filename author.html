<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作者作品 - 白蝉声文学平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica', 'Arial', sans-serif;
      background-color: #fff;
      color: #000;
      line-height: 1.6;
    }

    /* 顶部导航栏 */
    .top-bar {
      background-color: #f5f5f5;
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .nav-links a {
      color: #000;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #666;
    }

    .nav-bottom {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .nav-bottom a {
      color: #000;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-bottom a:hover {
      color: #666;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .search-container {
      position: relative;
    }

    .search-input {
      padding: 14px 40px 14px 15px;
      border: none;
      border-radius: 8px;
      background-color: #d8d8d8;
      font-size: 1rem;
      width: 300px;
      outline: none;
    }

    .search-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .submit-btn {
      padding: 12px 20px;
      border: 1px solid #000;
      border-radius: 8px;
      background-color: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #000;
      color: #fff;
    }

    /* 作者作品区域 */
    .author-section {
      padding: 80px 0;
    }

    .author-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .author-name {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .author-bio {
      font-size: 1.2rem;
      color: #666;
      max-width: 800px;
      margin: 0 auto;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }

    .work-item {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .work-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .image-container {
      border-radius: 12px; 
      overflow: hidden;
      aspect-ratio: 1.25/1;
      position: relative;
    }

    .image {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }

    .gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .work-item:hover .gradient {
      opacity: 1;
    }

    .work-info {
      margin-top: 15px;
    }

    .work-title {
      font-size: 1.2rem;
      font-weight: 500;
      color: #000;
      margin-bottom: 10px;
    }

    .work-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: #999;
    }

    /* 悬停效果 */
    .hover-effect {
      position: relative;
    }
    .hover-effect::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background-color: #ccc;
      z-index: 1;
    }
    .hover-effect::before {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      background-color: #000;
      transition: width 0.3s ease;
      z-index: 2;
    }
    .hover-effect:hover::before {
      width: 100%;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .works-grid {
        grid-template-columns: 1fr;
      }

      .nav {
        flex-direction: column;
        gap: 20px;
      }

      .nav-left {
        align-items: center;
      }

      .search-input {
        width: 250px;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <div class="top-bar">
    <div class="container">
      <div class="nav">
        <div class="nav-left">
          <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="category.html">分类</a>
            <a href="column.html">专栏</a>
          </div>
          <div class="nav-bottom">
            <a href="category.html?category=shiyan">实验</a>
            <a href="category.html?category=duhougan">读后感</a>
            <a href="category.html?category=youle">娱乐幽默</a>
          </div>
        </div>
        <div class="nav-right">
          <div class="search-container">
            <input type="text" class="search-input" placeholder="">
            <img src="/icons/search.svg" alt="Search" class="search-icon" onclick="handleSearch()">
          </div>
          <a href="tougao.html"><button class="submit-btn">提交</button></a>
        </div>
      </div>
    </div>
  </div>

  <!-- 作者作品区域 -->
  <section class="author-section">
    <div class="container">
      <div class="author-header">
        <h1 class="author-name" id="author-name">作者作品</h1>
        <p class="author-bio" id="author-bio">这里展示了作者的所有作品，点击作品卡片可以阅读完整内容。</p>
      </div>

      <div class="works-grid" id="works-grid">
        <!-- 作品将通过JavaScript动态生成 -->
      </div>
    </div>
  </section>

  <script>
    // 处理搜索
    function handleSearch() {
      const searchInput = document.querySelector('.search-input');
      const searchTerm = searchInput.value.trim();
      if (searchTerm) {
        window.location.href = `search.html?query=${encodeURIComponent(searchTerm)}`;
      }
    }

    // 作者作品数据
    const authorWorks = {
      wuciren: {
        name: '吴赐仁',
        bio: '吴赐仁是一位先锋文学作家，作品风格独特，擅长通过细腻的描写和深邃的思考展现现代生活的复杂性。',
        works: [
          {
            id: 'tiaolou',
            title: '跳楼',
            date: '2026/4/10',
            image: '/images/duhougan.jpg'
          },
          {
            id: 'chanyushui',
            title: '蝉 鱼 水',
            date: '2026/4/5',
            image: 'public/images/third.jpg'
          }
        ]
      },
      yangshu: {
        name: '杨树',
        bio: '杨树是一位多产的短篇小说作家，作品涵盖多种题材，擅长通过细腻的描写和深刻的洞察展现人性的复杂性。',
        works: [
          {
            id: 'shaoyigehaocaiping',
            title: '烧好一个彩瓶',
            date: '2026/4/1',
            image: 'public/images/duanpian.jpg'
          },
          {
            id: 'chunwu',
            title: '春雾',
            date: '2026/3/28',
            image: 'public/images/duanpian.jpg'
          },
          {
            id: 'chengdu',
            title: '程度',
            date: '2026/3/25',
            image: 'public/images/duanpian.jpg'
          },
          {
            id: 'tingjue',
            title: '听觉',
            date: '2026/3/20',
            image: 'public/images/duanpian.jpg'
          },
          {
            id: 'yuedusuduceshi',
            title: '阅读速度测试',
            date: '2026/3/15',
            image: 'public/images/duanpian.jpg'
          },
          {
            id: 'buxingdexingfu',
            title: '不幸的幸福',
            date: '2026/3/10',
            image: 'public/images/duanpian.jpg'
          },
          {
            id: 'jielun',
            title: '结论',
            date: '2026/3/5',
            image: 'public/images/duanpian.jpg'
          }
        ]
      }
    };

    // 加载作者作品
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const authorId = urlParams.get('author');

      if (authorId && authorWorks[authorId]) {
        const author = authorWorks[authorId];
        document.getElementById('author-name').textContent = author.name;
        document.getElementById('author-bio').textContent = author.bio;

        const worksGrid = document.getElementById('works-grid');
        worksGrid.innerHTML = '';

        author.works.forEach(work => {
          const workItem = document.createElement('div');
          workItem.className = 'work-item';
          workItem.onclick = function() {
            window.location.href = `article.html?article=${work.id}`;
          };
          workItem.innerHTML = `
            <div class="image-container">
              <div class="image" style="background-image: url('${work.image}');"></div>
              <div class="gradient"></div>
            </div>
            <div class="work-info">
              <h3 class="work-title">${work.title}</h3>
              <div class="work-meta">
                <span>${work.date}</span>
              </div>
            </div>
          `;
          worksGrid.appendChild(workItem);
        });
      }
    });
  </script>
</body>
</html>
