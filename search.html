          column.author.toLowerCase().includes(lowerKeyword) ||
          column.category.toLowerCase().includes(lowerKeyword) ||
          column.description.toLowerCase().includes(lowerKeyword)
        );

        // 搜索作者 - 检查是否有作者名字匹配
        const matchedAuthors = [...new Set(matchedArticles.map(a => a.author))].filter(author =>
          author.toLowerCase().includes(lowerKeyword)
        );

        // 生成作者作品集入口
        const authorEntries = matchedAuthors.map(author => {
          const authorArticles = articlesData.filter(a => a.author === author);
          return `
            <div class="result-section">
              <h2 class="section-title">相关作者</h2>
              <div class="results-grid">
                <div class="author-item" onclick="window.location.href='author.html?author=${encodeURIComponent(author)}'">
                  <h3>${author}</h3>
                  <p>收录 ${authorArticles.length} 篇作品，点击查看全部</p>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // 生成专栏结果
        const columnEntries = matchedColumns.length > 0 ? `
          <div class="result-section">
            <h2 class="section-title">专栏</h2>
            <div class="results-grid">
              ${matchedColumns.map(result => `
                <div class="result-item" onclick="window.location.href='column.html?column=${result.title}'">
                  <img src="${result.image}" alt="${result.title}" class="result-image">
                  <div class="result-content">
                    <p>${result.description}</p>
                    <h3>${result.title}</h3>
                  </div>
                  <div class="result-meta">
                    <span>${result.author} · 作</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : '';

        // 生成作品结果
        const articleEntries = matchedArticles.length > 0 ? `
          <div class="result-section">
            <h2 class="section-title">作品</h2>
            <div class="results-grid">
              ${matchedArticles.map(result => `
                <div class="result-item" onclick="window.location.href='article.html?file=${result.file}'">
                  <img src="${result.image}" alt="${result.title}" class="result-image">
                  <div class="result-content">
                    <p>${result.description}</p>
                    <h3>${result.title}</h3>
                  </div>
                  <div class="result-meta">
                    <span>${result.author} · 作</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : '';

        const allResults = [...matchedArticles, ...matchedColumns];

        if (allResults.length === 0 && matchedAuthors.length === 0) {
          resultsContainer.innerHTML = `
            <div class="empty-state">
              <h3>未找到相关结果</h3>
              <p>抱歉，没有找到与 "${keyword}" 相关的内容</p>
              <a href="index.html" class="back-btn">返回首页</a>
            </div>
          `;
        } else {
          resultsContainer.innerHTML = `
            <div class="results-list">
              ${authorEntries}
              ${columnEntries}
              ${articleEntries}
            </div>
          `;
        }
      }

      // 页面加载时执行搜索
      document.addEventListener('DOMContentLoaded', function() {
        const keyword = getURLParameter('q');
        if (keyword) {
          document.getElementById('searchInput').value = keyword;
          performSearch(keyword);
        } else {
          performSearch('');
        }
      });
    </script>
  </body>
</html>
