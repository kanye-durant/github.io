<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="connect-src 'self' https://zsztoepvtxddqyhdkqdb.supabase.co;" />
    <script type="module">import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";window.supabase={createClient};</script>
    <title>我的文章 - 白蝉声</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Georgia', serif; line-height: 1.6; color: #333; background-color: #f9f9f9; }
      .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
      
      .article-list { list-style: none; }
      .article-item { background-color: #fff; padding: 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.3s ease, box-shadow 0.3s ease; }
      .article-item:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
      .article-item a { text-decoration: none; color: inherit; }
      .article-title { font-size: 1.5rem; color: #000; margin-bottom: 15px; }
      .article-excerpt { color: #666; margin-bottom: 15px; font-size: 1rem; line-height: 1.6; }
      .article-meta { display: flex; gap: 20px; color: #999; font-size: 0.9rem; }
      
      .empty-state { text-align: center; padding: 100px 0; }
      .empty-state h3 { font-size: 2rem; color: #000; margin-bottom: 20px; }
      .empty-state p { font-size: 1.1rem; color: #666; margin-bottom: 30px; }
      .empty-state .btn { display: inline-block; padding: 12px 24px; background-color: #000; color: #fff; text-decoration: none; border-radius: 4px; }
      .empty-state .btn:hover { background-color: #333; }
      
      .login-prompt { text-align: center; padding: 100px 0; }
      .login-prompt h3 { font-size: 2rem; color: #000; margin-bottom: 20px; }
      .login-prompt p { font-size: 1.1rem; color: #666; margin-bottom: 30px; }
      .login-prompt .btn { display: inline-block; padding: 12px 24px; background-color: #000; color: #fff; text-decoration: none; border-radius: 4px; }
      .login-prompt .btn:hover { background-color: #333; }
      
      footer { background-color: #fff; color: #000; text-align: center; padding: 40px 0; border-top: 1px solid #e0e0e0; margin-top: 40px; }
      .footer-content h3 { font-size: 1.2rem; margin-bottom: 10px; }
      .footer-links { display: flex; gap: 15px; justify-content: center; margin: 10px 0; }
      .footer-links a { color: #000; text-decoration: none; font-size: 0.9rem; }
      .footer-links a:hover { color: #666; }
      .footer-content p { font-size: 0.8rem; margin-top: 10px; color: #666; }
    </style>
  </head>
  <body>
    <div class="top-bar" style="background-color: #f0f0f0; padding: 15px 0 20px;">
      <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
        <div class="top-bar-content" style="display: flex; align-items: center; justify-content: space-between;">
          <!-- 左侧Logo和导航链接 -->
          <div class="top-bar-left" style="display: flex; align-items: flex-start; gap: 30px;">
            <a href="index.html" class="logo" style="display: flex; align-items: center; text-decoration: none; width: 32px; margin-top: 8px;"></a>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <div class="nav-links" style="display: flex; gap: 25px;">
                <a href="index.html" class="nav-link" style="color: #333; text-decoration: none; font-size: 1rem; font-weight: 400; font-family: 'Helvetica', 'Arial', sans-serif;">首页</a>
                <a href="index.html#categories" class="nav-link" style="color: #333; text-decoration: none; font-size: 1rem; font-weight: 400; font-family: 'Helvetica', 'Arial', sans-serif;">分类</a>
                <a href="index.html#columns" class="nav-link" style="color: #333; text-decoration: none; font-size: 1rem; font-weight: 400; font-family: 'Helvetica', 'Arial', sans-serif;">专栏</a>
                <a href="about.html" class="nav-link" style="color: #333; text-decoration: none; font-size: 1rem; font-weight: 400; font-family: 'Helvetica', 'Arial', sans-serif;">关于</a>
                <a href="contact.html" class="nav-link" style="color: #333; text-decoration: none; font-size: 1rem; font-weight: 400; font-family: 'Helvetica', 'Arial', sans-serif;">联系</a>
              </div>
              <div class="nav-links" style="display: flex; gap: 25px;">
                <a href="experiment.html" class="nav-link" style="color: #000; text-decoration: none; font-size: 0.9rem; font-weight: 500; font-family: 'Helvetica', 'Arial', sans-serif;">实验</a>
                <span class="nav-link" style="color: #999; font-size: 0.9rem; font-weight: 500; font-family: 'Helvetica', 'Arial', sans-serif; cursor: not-allowed;">读后感</span>
                <span class="nav-link" style="color: #999; font-size: 0.9rem; font-weight: 500; font-family: 'Helvetica', 'Arial', sans-serif; cursor: not-allowed;">娱乐幽默</span>
              </div>
            </div>
          </div>
          
          <!-- 中间搜索框 -->
          <div class="top-bar-center" style="flex: 0 0 400px; margin: 0 20px;">
            <div class="search-container" style="position: relative; width: 100%;">
              <input type="text" class="search-input" style="width: 100%; padding: 14px 40px 14px 15px; background-color: #d8d8d8; border: none; border-radius: 8px; font-size: 0.9rem; font-family: 'Helvetica', 'Arial', sans-serif;">
              <img src="search.svg" alt="搜索" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; cursor: pointer; opacity: 0.5;" onclick="handleSearch(event)">
            </div>
          </div>
          
          <!-- 右侧按钮 -->
          <div class="top-bar-right" style="display: flex; align-items: center; gap: 15px;">
            <div id="auth-container">
              <a href="#" onclick="event.preventDefault(); handleLoginDirect()" style="color: #000; text-decoration: none; font-size: 0.9rem; font-weight: 500; font-family: 'Helvetica', 'Arial', sans-serif; margin-right: 5px; cursor: pointer;">登录</a>
              <span style="color: #999;">/</span>
              <a href="#" onclick="event.preventDefault(); handleRegisterDirect()" style="color: #000; text-decoration: none; font-size: 0.9rem; font-weight: 500; font-family: 'Helvetica', 'Arial', sans-serif; margin-left: 5px; cursor: pointer;">注册</a>
            </div>
            <!-- 用户信息下拉菜单 -->
            <div id="user-dropdown-container" style="display: none;" class="user-dropdown">
              <div class="user-info" onclick="toggleUserDropdown()">
                <span id="user-greeting" style="font-size: 0.9rem; font-weight: 500;">欢迎, </span>
                <span id="user-name" style="font-size: 0.9rem;"></span>
              </div>
              <div class="dropdown-menu" id="user-dropdown-menu">
                <a href="#" onclick="event.preventDefault(); openSettingsModal()">个人设置</a>
                <a href="my-articles.html" onclick="event.preventDefault(); navigateToMyArticles()">我的文章</a>
                <a href="#" onclick="event.preventDefault(); handleLogout()">切换账号</a>
                <a href="#" onclick="event.preventDefault(); handleLogout()">退出登录</a>
              </div>
            </div>
            <!-- 登录后显示的提交按钮 -->
            <a href="tougao.html" id="logged-in-submit-btn" style="display: none; background-color: #fff; color: #000; padding: 8px 16px; border: 1px solid #000; border-radius: 8px; font-size: 0.9rem; text-decoration: none; font-weight: 500; font-family: 'Helvetica', 'Arial', sans-serif; transition: all 0.3s ease;">提交</a>
          </div>
          <style>
            .submit-btn:hover {
              background-color: #000 !important;
              color: #fff !important;
            }
            .user-dropdown {
              position: relative;
              display: inline-block;
            }
            .user-info {
              display: flex;
              align-items: center;
              gap: 5px;
              cursor: pointer;
              padding: 8px 12px;
            }
            .dropdown-arrow {
              width: 0;
              height: 0;
              border-left: 4px solid transparent;
              border-right: 4px solid transparent;
              border-top: 4px solid #000;
              margin-left: 5px;
            }
            .dropdown-menu {
              display: none;
              position: absolute;
              top: 100%;
              right: 0;
              background-color: #fff;
              min-width: 160px;
              box-shadow: 0 8px 16px rgba(0,0,0,0.2);
              z-index: 100;
              border-radius: 8px;
              overflow: hidden;
            }
            .dropdown-menu a {
              color: #333;
              padding: 12px 16px;
              text-decoration: none;
              display: block;
              font-size: 0.9rem;
              transition: background-color 0.3s ease;
            }
            .dropdown-menu a:hover {
              background-color: #f5f5f5;
            }
          </style>
        </div>
      </div>
    </div>

    <section class="section" style="padding: 60px 0;">
      <div class="container">
        <div class="page-title" style="text-align: center; margin-bottom: 40px;">
          <h1 style="font-size: 2.5rem; color: #000; margin-bottom: 10px;">我的文章</h1>
          <p id="user-display-name" style="color: #666;"></p>
        </div>
        
        <div id="content-area">
          <div class="loading" style="text-align: center; padding: 50px;">
            <p>加载中...</p>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-content">
        <h3>白蝉声</h3>
        <div class="footer-links">
          <a href="index.html">首页</a>
          <a href="about.html">关于</a>
          <a href="contact.html">联系</a>
        </div>
        <p>© 2024 白蝉声. All rights reserved.</p>
      </div>
    </footer>

    <script>
      const supabaseUrl = 'https://zsztoepvtxddqyhdkqdb.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzenRvZXB2dHhkZHF5aGRrcWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjc0NzEwNDYsImV4cCI6MjA0MzA0NzA0Nn0.Uy3Z5h2Jc85X6K8p6G9R9R9R9R9R9R9R9R9R9R9R9';
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      async function initializeAuthorArticles(username) {
        if (username !== '吴赐仁') return;
        
        const { data: existingArticles } = await supabase
          .from('articles')
          .select('id')
          .eq('author', username)
          .limit(1);

        if (!existingArticles || existingArticles.length === 0) {
          const authorArticles = [
            {
              title: '蝉鱼水',
              content: '<p>蝉鱼水，是我家乡那条小河的名字。</p><p>小时候，每到夏天，我就和小伙伴们一起跑到河边玩耍。河水清澈见底，能看见小鱼在水草间穿梭。蝉鸣声声，阳光透过树叶洒在水面上，波光粼粼。</p><p>我们会在河边捉蝉，或者比赛打水漂。有时候，我们会躺在河边的草地上，看着天空中的白云飘过，听着蝉鸣和水流声，感觉整个世界都安静下来了。</p><p>后来我离开了家乡，去了大城市读书、工作。但每当想起蝉鱼水，想起那些夏日的午后，心里就会涌起一股暖流。那条小河，承载了我太多美好的回忆。</p>',
              category: '随笔',
              author: username,
              created_at: new Date().toISOString()
            },
            {
              title: '跳楼',
              content: '<p>站在楼顶，风很大，吹得我头发乱舞。</p><p>我往下看，地面上的人像蚂蚁一样小。我想起了很多事情，想起了小时候的梦想，想起了曾经的誓言，想起了那些还没来得及说出口的话。</p><p>但我没有跳下去。因为我突然意识到，生活虽然不容易，但还有很多值得珍惜的东西。楼下的树正在发芽，远处传来孩子们的笑声，天空还是那么蓝。</p><p>我转身走下楼，决定好好活着。</p>',
              category: '短篇小说',
              author: username,
              created_at: new Date().toISOString()
            }
          ];

          for (const article of authorArticles) {
            await supabase.from('articles').insert([article]);
          }
        }
      }

      async function loadMyArticles() {
        try {
          const { data: { user }, error: userError } = await Promise.race([
            supabase.auth.getUser(),
            new Promise((_, reject) => setTimeout(() => reject(new Error('请求超时')), 5000))
          ]);
          
          if (userError || !user) {
            document.getElementById('content-area').innerHTML = `
              <div class="login-prompt">
                <h3>请先登录</h3>
                <p>登录后即可查看和管理您的文章</p>
                <a href="index.html" class="btn">返回首页登录</a>
              </div>
            `;
            return;
          }

          const username = user.user_metadata?.username || user.email;
          document.getElementById('user-display-name').textContent = `作者：${username}`;

          await initializeAuthorArticles(username);

          const { data: articles, error } = await Promise.race([
            supabase
              .from('articles')
              .select('*')
              .eq('author', username)
              .order('created_at', { ascending: false }),
            new Promise((_, reject) => setTimeout(() => reject(new Error('请求超时')), 5000))
          ]);

          if (error) {
            document.getElementById('content-area').innerHTML = `
              <div class="empty-state">
                <h3>加载失败</h3>
                <p>无法获取文章列表，请稍后重试</p>
              </div>
            `;
            return;
          }

          if (!articles || articles.length === 0) {
            document.getElementById('content-area').innerHTML = `
              <div class="empty-state">
                <h3>暂无文章</h3>
                <p>您还没有发布任何文章</p>
                <a href="tougao.html" class="btn">去投稿</a>
              </div>
            `;
            return;
          }

          const articleList = articles.map(article => `
            <li class="article-item">
              <a href="article.html?id=${article.id}">
                <h2 class="article-title">${article.title}</h2>
                <p class="article-excerpt">${article.content.substring(0, 150)}...</p>
                <div class="article-meta">
                  <span>分类：${article.category || '未分类'}</span>
                  <span>发布时间：${new Date(article.created_at).toLocaleDateString('zh-CN')}</span>
                </div>
              </a>
            </li>
          `).join('');

          document.getElementById('content-area').innerHTML = `
            <ul class="article-list">${articleList}</ul>
          `;
        } catch (err) {
          document.getElementById('content-area').innerHTML = `
            <div class="empty-state">
              <h3>加载失败</h3>
              <p>${err.message || '网络连接异常，请检查网络后重试'}</p>
              <a href="javascript:location.reload()" class="btn">重新加载</a>
            </div>
          `;
        }
      }

      function handleSearch(event) {
        event.preventDefault();
        const searchInput = document.querySelector('.search-input');
        const query = searchInput ? searchInput.value.trim() : '';
        if (query) {
          window.location.href = `index.html?search=${encodeURIComponent(query)}`;
        }
      }

      function toggleUserDropdown() {
        const dropdownMenu = document.getElementById('user-dropdown-menu');
        dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
      }

      function navigateToMyArticles() {
        document.getElementById('user-dropdown-menu').style.display = 'none';
      }

      function openSettingsModal() {
        document.getElementById('user-dropdown-menu').style.display = 'none';
      }

      async function handleLogout() {
        try {
          await supabase.auth.signOut();
          document.getElementById('auth-container').style.display = 'flex';
          document.getElementById('user-dropdown-container').style.display = 'none';
          document.getElementById('user-dropdown-menu').style.display = 'none';
          document.getElementById('logged-in-submit-btn').style.display = 'none';
          window.location.reload();
        } catch (error) { console.error('退出失败:', error); }
      }

      async function handleLoginSuccess(user) {
        const authContainer = document.getElementById('auth-container');
        const dropdownContainer = document.getElementById('user-dropdown-container');
        const loggedInSubmitBtn = document.getElementById('logged-in-submit-btn');
        const userName = document.getElementById('user-name');
        const username = user.user_metadata?.username || user.email;
        userName.textContent = username;
        authContainer.style.display = 'none';
        dropdownContainer.style.display = 'flex';
        loggedInSubmitBtn.style.display = 'inline-block';
      }

      function handleLoginDirect() {
        const authModal = document.createElement('div');
        authModal.id = 'auth-modal';
        authModal.innerHTML = `
          <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; display: flex;">
            <div style="background-color: white; padding: 30px; border-radius: 12px; width: 400px; max-width: 90%;">
              <h2 style="text-align: center; margin-bottom: 20px;">登录</h2>
              <input type="email" id="login-email" placeholder="邮箱" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
              <input type="password" id="login-password" placeholder="密码" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
              <button onclick="submitLogin()" style="width: 100%; padding: 12px; background-color: #000; color: white; border: none; border-radius: 8px; cursor: pointer;">登录</button>
              <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                没有账号？<a href="#" onclick="showRegister()" style="color: #000;">注册</a>
              </p>
              <p id="login-error" style="color: red; text-align: center; margin-top: 10px; display: none;"></p>
            </div>
          </div>
        `;
        document.body.appendChild(authModal);
      }

      function handleRegisterDirect() {
        const authModal = document.createElement('div');
        authModal.id = 'auth-modal';
        authModal.innerHTML = `
          <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; display: flex;">
            <div style="background-color: white; padding: 30px; border-radius: 12px; width: 400px; max-width: 90%;">
              <h2 style="text-align: center; margin-bottom: 20px;">注册</h2>
              <input type="email" id="register-email" placeholder="邮箱" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
              <input type="text" id="register-username" placeholder="用户名" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
              <input type="password" id="register-password" placeholder="密码" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
              <button onclick="submitRegister()" style="width: 100%; padding: 12px; background-color: #000; color: white; border: none; border-radius: 8px; cursor: pointer;">注册</button>
              <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                已有账号？<a href="#" onclick="showLogin()" style="color: #000;">登录</a>
              </p>
              <p id="register-error" style="color: red; text-align: center; margin-top: 10px; display: none;"></p>
            </div>
          </div>
        `;
        document.body.appendChild(authModal);
      }

      async function submitLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
        } else {
          await handleLoginSuccess(data.user);
          document.getElementById('auth-modal').remove();
          window.location.reload();
        }
      }

      async function submitRegister() {
        const email = document.getElementById('register-email').value;
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const errorEl = document.getElementById('register-error');
        
        const { error } = await supabase.auth.signUp({ 
          email, 
          password, 
          options: { data: { username } } 
        });
        
        if (error) {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
        } else {
          errorEl.textContent = '注册成功，请登录';
          errorEl.style.color = 'green';
          errorEl.style.display = 'block';
          setTimeout(() => {
            showLogin();
          }, 1500);
        }
      }

      function showLogin() {
        document.getElementById('auth-modal').remove();
        handleLoginDirect();
      }

      function showRegister() {
        document.getElementById('auth-modal').remove();
        handleRegisterDirect();
      }

      document.addEventListener('DOMContentLoaded', async function() {
        loadMyArticles();
        const { data: { user } } = await supabase.auth.getUser();
        if (user) { await handleLoginSuccess(user); }
        
        document.addEventListener('click', function(event) {
          const dropdownMenu = document.getElementById('user-dropdown-menu');
          const dropdownContainer = document.getElementById('user-dropdown-container');
          if (dropdownMenu && dropdownContainer && !dropdownContainer.contains(event.target)) { 
            dropdownMenu.style.display = 'none'; 
          }
        });
      });
    </script>
  </body>
</html>
